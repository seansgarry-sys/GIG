{% extends "base.html" %}

{% block title %}Booking Request Sent | {{ site_title }}{% endblock %}

{% block content %}
<section class="screen screen-centered">
    <div class="card success-card">
        <p class="eyebrow">Sent</p>
        <h1>Booking request sent</h1>

    </div>
</section>
{% endblock %}
